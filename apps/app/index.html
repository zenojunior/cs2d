<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0c12" />
    <title>CS2d.app · 2D replay viewer for Counter-Strike 2 demos</title>
    <meta
      name="description"
      content="Powerful 2D replay viewer for CS2 demos. Everything is processed locally in your browser: your demos never leave your machine."
    />
    <link rel="canonical" href="https://cs2d.app/" />

    <!-- Open Graph / social sharing. og:image must be an absolute URL. -->
    <meta property="og:url" content="https://cs2d.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CS2d.app" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:title" content="CS2d.app · 2D replay viewer for Counter-Strike 2 demos" />
    <meta
      property="og:description"
      content="Powerful 2D replay viewer for CS2 demos. Everything is processed locally in your browser: your demos never leave your machine."
    />
    <meta property="og:image" content="https://cs2d.app/seo.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CS2d.app · 2D replay viewer for Counter-Strike 2 demos" />
    <meta
      name="twitter:description"
      content="Powerful 2D replay viewer for CS2 demos. Everything is processed locally in your browser: your demos never leave your machine."
    />
    <meta name="twitter:image" content="https://cs2d.app/seo.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load the Google Fonts stylesheet without blocking the first paint: it
         applies once downloaded (media swap), so the inline loader and content
         paint immediately and the fonts swap in via font-display:swap. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Structured data: free, browser-based tool (rich results / discovery). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "CS2d.app",
        "url": "https://cs2d.app/",
        "description": "Powerful 2D replay viewer for CS2 demos. Everything is processed locally in your browser: your demos never leave your machine.",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Web",
        "browserRequirements": "Requires JavaScript and WebAssembly",
        "inLanguage": ["pt-BR", "en", "es", "fr", "de", "ru", "pl", "tr", "uk"],
        "isAccessibleForFree": true,
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "author": { "@type": "Person", "name": "Zeno Junior", "url": "https://zenojunior.com" }
      }
    </script>
  </head>
  <body>
    <!-- Inline app shell: painted straight from the static HTML, before the JS
         bundle and locale finish loading, so the first visit shows the dark
         background + a spinner instead of a blank/grey screen. Vue clears #app's
         contents (loader included) when it mounts. -->
    <style>
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0c12;
      }
      #app-loading .spinner {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 3px solid #1f2533;
        border-top-color: #fdac1a;
        animation: app-loading-spin 0.8s linear infinite;
      }
      @keyframes app-loading-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-loading .spinner {
          animation-duration: 2s;
        }
      }
    </style>
    <div id="app">
      <div id="app-loading">
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
