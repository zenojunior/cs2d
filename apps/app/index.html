<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0c12" />
    <title>CS Demo Analyzer</title>

    <!-- Warm the first ambient preview fixture so it downloads in parallel with
         the JS bundle instead of waiting for the app to mount. Matches the
         deterministic first preview in DemoAnalyzerView. Only on lg+ screens,
         where the preview is actually shown. -->
    <link
      rel="preload"
      as="fetch"
      href="/replays/inferno-preview.json"
      type="application/json"
      crossorigin="anonymous"
      media="(min-width: 1024px)"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
