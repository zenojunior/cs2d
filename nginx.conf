server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compress text-based assets on the fly.
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/css application/javascript application/json image/svg+xml;

    # Vue Router runs in history mode: unknown paths (/about, /:id, ...) must
    # fall back to index.html instead of returning 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite emits content-hashed filenames under /assets, so they can be cached
    # forever and safely busted by a new hash on each deploy.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    # Serve WebAssembly with the correct MIME type (demo parser + zstd decoder).
    # Scoped to its own location so the global mime.types mapping is preserved.
    location ~ \.wasm$ {
        types        { }
        default_type application/wasm;
        expires      1y;
        add_header   Cache-Control "public, immutable";
    }

    # index.html must never be cached, so clients always pick up the latest hashes.
    location = /index.html {
        expires    -1;
        add_header Cache-Control "no-cache";
    }
}
