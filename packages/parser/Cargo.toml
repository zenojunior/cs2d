[package]
name = "cs2-demo-parser-wasm"
version = "0.0.0"
edition = "2021"
description = "Parser de demo de CS2 em WebAssembly: le um .dem e emite o Replay JSON do o schema de replay 2D. Roda no browser, dentro de um Web Worker."

[lib]
crate-type = ["cdylib", "rlib"]

[features]
# Build nativo de iteracao usa --no-default-features para virar um binario.
default = ["wasm"]
wasm = ["dep:wasm-bindgen", "dep:console_error_panic_hook"]

[dependencies]
source2-demo = { version = "0.5.4", default-features = false, features = ["cs2"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wasm-bindgen = { version = "0.2", optional = true }
console_error_panic_hook = { version = "0.1", optional = true }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
